# promptfooconfig.yaml — Causa-Raiz Cerebro (LLM-as-judge gate) — v2 calibrada
# Rubrica: 4 critérios (0-2), corte >= 6, nenhum critério zerado

prompts:
  - file://./prompt.md

providers:
  - openai:gpt-4o-mini

tests:
  - description: "Degradação Cerebro — reindex travado saturando heap"
    vars:
      artefato_config: |
        # cerebro.yaml — configuração do cluster Elasticsearch (repositório de infra)
        cerebro:
          shards: 12
          replicas_per_shard: 1
          jvm_heap: 8g
          refresh_interval: 1s
          reindex_job:
            schedule: "0 2 * * *"     # roda todo dia às 02:00
            avg_duration_min: 90      # normalmente termina ~03:30
          query_cache:
            enabled: true
            size_mb: 512
      artefato_metricas: |
        timestamp              search_p99_ms   indexed_docs_per_s   heap_used_pct   cache_hit_pct
        2026-05-13 08:00 UTC   850             4200                 61              74
        2026-05-13 08:30 UTC   1100            4100                 68              71
        2026-05-13 09:00 UTC   2300            9800                 79              58
        2026-05-13 09:30 UTC   4100            11200                88              41
        2026-05-13 10:00 UTC   6700            12400                94              29
      artefato_logs: |
        [2026-05-13T08:02:11,540][INFO ][o.e.t.LoggingTaskListener              ][cerebro-node-3] reindex task [88123] (scheduled 02:00) progress, created [3.8M]/[10M] docs (38%)
        [2026-05-13T08:14:33,019][WARN ][o.e.m.j.JvmGcMonitorService            ][cerebro-node-3] [gc][young] duration [620ms], collections [1] in [10s], heap [4.9gb]->[3.1gb]/[8gb]
        [2026-05-13T08:41:07,222][INFO ][o.e.i.IndexingMemoryController         ][cerebro-node-3] now throttling indexing for shard [logs-2026.05][7]: segment writing can't keep up
        [2026-05-13T09:03:55,810][WARN ][o.e.t.ThreadPool                       ][cerebro-node-3] write thread pool queue at [150/200]
        [2026-05-13T09:12:48,402][WARN ][o.e.m.j.JvmGcMonitorService            ][cerebro-node-3] [gc][old] duration [1.1s], collections [2] in [60s], heap [6.3gb]->[5.9gb]/[8gb]
        [2026-05-13T09:20:02,118][INFO ][o.e.t.LoggingTaskListener              ][cerebro-node-3] reindex task [88123] (scheduled 02:00) progress, created [4.0M]/[10M] docs (40%)
        [2026-05-13T09:31:17,653][WARN ][o.e.i.b.HierarchyCircuitBreakerService ][cerebro-node-3] [parent] usage [6.9gb/8gb] (86%), approaching limit
        [2026-05-13T09:44:29,901][WARN ][o.e.s.SearchService                    ][cerebro-node-3] slow query on shard [logs-2026.05][7] took [2380ms]
        [2026-05-13T09:51:08,377][WARN ][o.e.t.ThreadPool                       ][cerebro-node-3] write thread pool queue at [188/200]
        [2026-05-13T09:58:41,102][WARN ][o.e.t.ThreadPool                       ][cerebro-node-3] write thread pool queue full [200/200], rejecting bulk — EsRejectedExecutionException
        [2026-05-13T09:58:43,210][WARN ][o.e.m.j.JvmGcMonitorService            ][cerebro-node-3] [gc][old] duration [1.8s], collections [4] in [60s], heap [7.6gb]->[7.4gb]/[8gb]
        [2026-05-13T09:58:44,005][INFO ][o.e.t.LoggingTaskListener              ][cerebro-node-3] reindex task [88123] (scheduled 02:00) still running, created [4.1M]/[10M] docs (41%), ETA unknown
        [2026-05-13T09:58:45,889][WARN ][o.e.i.IndexingMemoryController         ][cerebro-node-3] indexing buffer above limit, throttling shard [logs-2026.05][7]
        [2026-05-13T09:58:46,330][DEBUG][o.e.s.query.QueryPhase                 ][cerebro-node-3] shard [logs-2026.05][7] search took [5031ms] (timeout [5000ms])
        [2026-05-13T09:58:46,512][ERROR][o.e.s.SearchService                    ][cerebro-node-3] search returned partial results: 11/12 shards succeeded
        [2026-05-13T09:58:46,701][WARN ][o.e.i.b.HierarchyCircuitBreakerService ][cerebro-node-3] [parent] circuit breaker tripped, usage [7.7gb/8gb] (96%) over limit
        [2026-05-13T09:58:47,001][WARN ][o.e.i.cache.query.IndicesQueryCache    ][cerebro-node-3] query cache eviction rate spiking, hit_ratio dropped to 0.29
        [2026-05-13T10:01:12,778][ERROR][o.e.s.SearchService                    ][cerebro-node-3] CircuitBreakingException: [parent] Data too large, would be [7.9gb/8gb]
        [2026-05-13T10:03:39,255][WARN ][o.e.t.ThreadPool                       ][cerebro-node-3] write thread pool rejected [1284] bulk requests in last 5min
        [2026-05-13T10:05:50,640][ERROR][o.e.s.SearchService                    ][cerebro-node-3] all shards failed for index [logs-2026.05] on 3 of last 20 queries
    assert:
      # Gate LLM-as-judge com rubrica calibrada — v2
      - type: llm-rubric
        value: |
          Avalie a saída do prompt de causa-raiz nos 4 critérios abaixo.
          Para cada critério, atribua uma nota de 0 a 2:
          0 = não atende, 1 = atende parcialmente, 2 = atende completamente.

          ## Critério 1 — Causa-raiz correta (0-2)
          A saída aponta a causa raiz REAL: o reindex job (scheduled 02:00, duração esperada 90min)
          NÃO CONCLUIU até as 10:00 (estava em 41% — apenas 4.1M de 10M docs), continuou consumindo
          heap da JVM por ~8h extras, saturando o sistema.
          Ou a saída trata isso como apenas "sobrecarga" ou "aumento de vazão" sem conectar ao
          reindex travado?
          Nota 0: Não menciona o reindex job como causa raiz, ou atribui a causa a fatores genéricos
          ("sobrecarga", "pico de tráfego").
          Nota 1: Menciona o reindex job mas não destaca que ele DEVERIA ter terminado às 03:30 e
          ainda estava rodando às 10:00 (6.5h de atraso), ou não conecta isso à saturação do heap.
          Nota 2: Aponta explicitamente: reindex job travado/incompleto como causa raiz, conectando:
          reindex não concluiu → consumo contínuo de heap por horas → GC pressure → circuit breaker →
          buscas lentas/parciais → cache eviction.

          ## Critério 2 — Correlação × causa (0-2)
          A saída separa corretamente o que é CAUSA do que é CONSEQUÊNCIA?
          Causas reais: reindex travado, configuração de heap subdimensionada para o volume.
          Consequências: aumento de indexed_docs_per_s, heap alto, GC pressure, circuit breaker,
          buscas lentas, cache hit baixo, buscas parciais.
          Nota 0: Trata consequências (heap alto, cache baixo, buscas lentas) como causas equivalentes.
          Nota 1: Mistura causa e efeito em alguns pontos (ex.: "aumento na vazão de indexação" listado
          como causa quando é efeito do reindex ainda rodando).
          Nota 2: Hierarquia causal clara: reindex travado → heap saturado → circuit breaker →
          degradação em cascata. Consequências identificadas como tal.

          ## Critério 3 — Ação proporcional (0-2)
          A saída propõe ações COERENTES com o diagnóstico, sem sobre nem subdimensionar?
          Ações corretas: (1) conter/pausar o reindex job imediatamente, (2) reagendar para fora do
          horário comercial, (3) revisar avg_duration_min (subestimado: 90min real vs 8h+), (4)
          considerar throttle de indexação ou aumentar heap.
          Ações genéricas ou desproporcionais: "aumentar o cluster", "reiniciar o nó", "comprar mais
          hardware", "revisar configuração" sem especificar o quê.
          Nota 0: Ação ausente, genérica ("revisar") ou desproporcional ("aumentar tudo").
          Nota 1: Ação razoável mas vaga ("interromper reindex e aumentar heap") sem especificar
          como ou por quê.
          Nota 2: Ação precisa: pausar reindex job, reagendar, revisar schedule/avg_duration,
          considerar throttle ou aumento de heap com justificativa.

          ## Critério 4 — Honestidade epistêmica (0-2)
          A saída reconhece o que os dados NÃO permitem concluir?
          Limitações reais: (a) só temos logs do cerebro-node-3 — não sabemos o estado dos outros nós,
          (b) não sabemos se o reindex job falhou (erro) ou apenas está lento (subdimensionado),
          (c) não temos métricas de CPU ou IO para descartar contenção de recursos,
          (d) não temos dados de consultas externas (clientes buscando mais que o normal?).
          Nota 0: Fabrica certeza ("a causa é X") sem reconhecer limitações.
          Nota 1: Menciona uma limitação genérica ("não temos todos os dados") sem especificar quais.
          Nota 2: Lista explicitamente as limitações específicas dos artefatos disponíveis.

          ## Cálculo da nota final
          Some as notas dos 4 critérios (total 0-8).
          Critério de aprovação: nota total >= 6 E nenhum critério com nota 0.
          Se nota total < 6 OU qualquer critério = 0, a saída é REPROVADA.